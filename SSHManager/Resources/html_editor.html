<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #f5f5f5;
    --toolbar-bg: #e8e8e8;
    --text: #1d1d1d;
    --border: #c8c8c8;
    --btn-hover: #d8d8d8;
    --editor-bg: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    display: flex; flex-direction: column; height: 100vh;
    user-select: none;
  }
  #toolbar {
    display: flex; gap: 4px; padding: 8px 12px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  #toolbar button {
    background: transparent; border: 1px solid transparent;
    border-radius: 5px; padding: 5px 9px; cursor: pointer;
    font-size: 13px; color: var(--text);
    display: flex; align-items: center; gap: 2px;
  }
  #toolbar button:hover { background: var(--btn-hover); border-color: var(--border); }
  #toolbar button.active { background: #c0c0c0; border-color: #aaa; }
  #toolbar .sep { width: 1px; background: var(--border); margin: 0 4px; }
  #editor {
    flex: 1; padding: 16px 20px; background: var(--editor-bg);
    border: none; outline: none; font-size: 14px; line-height: 1.6;
    color: var(--text); overflow-y: auto;
  }
  #editor h1 { font-size: 20px; margin: 0 0 8px 0; font-weight: 700; }
  #editor h2 { font-size: 17px; margin: 0 0 6px 0; font-weight: 600; }
  #editor h3 { font-size: 15px; margin: 0 0 4px 0; font-weight: 600; }
  #editor ul, #editor ol { padding-left: 24px; margin: 4px 0; }
  #editor li { margin: 2px 0; }
  #editor p { margin: 0 0 6px 0; }
  #status {
    padding: 2px 12px; font-size: 11px; color: #999;
    background: var(--toolbar-bg); border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<div id="toolbar">
  <button onclick="exec('bold')" title="Жирный (⌘B)"><b>B</b></button>
  <button onclick="exec('italic')" title="Курсив (⌘I)"><i>I</i></button>
  <span class="sep"></span>
  <button onclick="exec('formatBlock', 'h3')" title="Заголовок"><b>H</b></button>
  <button onclick="exec('insertUnorderedList')" title="Список">•</button>
  <span class="sep"></span>
  <button onclick="exec('undo')" title="Отменить (⌘Z)">↩</button>
  <button onclick="exec('redo')" title="Повторить (⌘⇧Z)">↪</button>
</div>
<div id="editor" contenteditable="true"></div>
<div id="status">Готово</div>

<script>
  const editor = document.getElementById('editor');

  function exec(cmd, arg) {
    document.execCommand(cmd, false, arg || null);
    editor.focus();
    updateToolbar();
  }

  function updateToolbar() {
    const btns = document.querySelectorAll('#toolbar button');
    btns.forEach(b => b.classList.remove('active'));
    if (document.queryCommandState('bold')) {
      document.querySelector('[onclick*="bold"]')?.classList.add('active');
    }
    if (document.queryCommandState('italic')) {
      document.querySelector('[onclick*="italic"]')?.classList.add('active');
    }
  }

  editor.addEventListener('keydown', (e) => {
    if (e.metaKey && e.key === 'b') { e.preventDefault(); exec('bold'); }
    if (e.metaKey && e.key === 'i') { e.preventDefault(); exec('italic'); }
    if (e.metaKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); exec('undo'); }
    if (e.metaKey && e.key === 'z' && e.shiftKey) { e.preventDefault(); exec('redo'); }
  });

  editor.addEventListener('input', () => {
    const html = editor.innerHTML.trim();
    window.webkit.messageHandlers.contentChanged.postMessage(html);
  });

  editor.addEventListener('click', updateToolbar);
  editor.addEventListener('keyup', updateToolbar);

  // Swift -> JS: установить содержимое
  function setContent(html) {
    editor.innerHTML = html;
    editor.focus();
  }
  // Swift -> JS: получить содержимое
  function getContent() {
    return editor.innerHTML.trim();
  }
</script>
</body>
</html>
